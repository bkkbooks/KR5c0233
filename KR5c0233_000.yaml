front:
  text: 神仙食氣金匱妙録命七
  hash: sha256:eab5d526646a685879576be66baac55d94661a67e0cec0e2965c2a7a5af3892b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0233_HFL_000-001a, image: hfl/0571/0571-092.png}
body:
  text: 京黑先生撰服隂陽符召六甲玉女法夫欲修長生學仙者先須餌氣絶粒保精有神其法並有漸次階級不可踰軌越格輒爾登陟務速必不逹造次必顛墜是欲依之即無誤纍矣凡絶粒慮五神播蕩邪妄忓凌宜服神仙絶穀符欲服之法常以平旦東向左手持符右手執水默祝之曰某甲好樂真道服食中和之氣甲子太玄玉女承翼給侍某甲行廚所在法成所求當得無令飢渴軍無大小人無多少皆當得飽祝訖即以水服符符自甲子起初至終六十日並同此祝餘甲當逐旬改呼玉女名字給侍巳下勿敗之其符二道一隂一陽隨隂陽日月别書之此符中甲子字至丙寅即改為丙寅字盡三十箇陽日勿令錯此符中乙丑字至丁卯即改為丁卯字盡三十箇隂日勿今錯陽符主甲丙戊庚壬子寅辰午申戌巳上日辰朱書之隂符主乙丁巳辛癸丑卯巳未酉亥巳上日辰愚書之甲子玉女名太玄字承翼盡一旬呼甲子太玄玉女承翼給侍某甲云云甲戌玉女名黃素字非廉準上甲申玉女名太素字瓊石唯上甲午玉女名絳宮字雲齡維上甲辰玉女名拜精字靈素維上甲寅玉女名青腰字惠精每一旬一玉女直事依經平旦持符執水祝而服之玉女當隨心應念係護人矣此法非但自已修行能為他人絶穀不限十人五人多少皆得如意自在矣唯要志心清潔一齊陳立向日嚴事所奉師道稱名再拜奉符如法皆能不食節解注含德之厚日六甲六癸相含而咽之以生精神也又經曰孰能有餘以奉天下唯有道者注云能掬之以補丹田引氣結精唯有道者所能解也中嶽郤儉食十一時氣法平旦七七四十九咽日出六六三十六咽食時五五二十五咽禺中四四一十六咽日中九九八十一咽日昳八八六十四咽晡時七七四十九咽日入六六三十六咽黃昏五五二十五咽人定四四一十六咽半夜九九八十一咽雞鳴八八六十四咽黃庭經曰玉池清水灌靈根手能修之可長存名曰飲食自然自然者華池華池者口中之唾也呼吸如法咽之即不飢矣初絶穀三日七日小極頭眩愼勿怪也滿二十一日成矣氣力日增欲食可食不欲即息禁絶隂陽不可亡精失氣也食榖乃通食氣辟穀法法曰先合口引之納氣咽之滿三百六十巳上不得減此咽之欲多多益善能日咽至千益眀咽而食日減一餐十日後能不食也後氣常入不出意氣常飽不食三日腹中悁悁若飢或小便赤黃取好棗九枚若好脯如棗者九枚念食噉一枚若二枚至三枚一晝一夜無過此九棗意中不念食者不須噉也常含棗核受氣令口中行津液嘉真人食黃氣法食黃之法常念脾飽胃黃氣潤澤神人長三寸著黃衣如立像兩手中各一人亦著黃衣如見即竊呼之黃常子黃常子黃庭真人在吾巳生為吾耳醴淵酒脯神丹芝草諸可飮食令並立來至咽之常以雞鳴時畫若飢者向日如上法為之飢取飽止行氣法初行氣小不調久行易耳正偃卧握固兩足間相去四五寸兩臂間相去亦四五寸去枕微息四九三百六十息如委衣骨節皆解初為勢至三十息後自轉易覺氣如雲行體中經營周身濡潤形體澆灌皮膚五藏六府皆悉充滿舊疾皆散為之不止則康壯矣握固者如嬰兒之卷手也初行氣先安穩其身而和其氣無與意爭若不和且止和乃為之常守之勿倦也小行即小得之大行即大得之氣至則形安形安則鼻息調和鼻息調和則清氣來至清氣來至則覺形熱覺形熱則頗汗出汗出勿使起則神安神安則道自見矣飬氣務欲其久當去忿怒愁憂去忿怒愁憂則氣不亂氣不亂則正氣來至正氣來至則口中甘香口中甘香則多唾多唾則鼻息微長鼻息微長則五藏安五藏安則氣各順其理百病退去飲食甘美三氣和則形輕強夀老證見遂長生矣行氣以鼻納氣以口吐氣微而引之名曰長息納氣有一吐氣有六納氣一者謂吸也吐氣六者謂吹呼嘻呵噓呬皆出氣也凡人之息一呼一吸無有此數欲為長息吐氣之法時寒可吹時溫可呼委曲治病吹以去寒呼以去熱嘻以去風又以去痛呵以去煩又以下氣噓以散滯呬以解極凡人極者則多噓呬道家行氣率不欲噓呬者噓呬者長息之忌也此男女俱存法本於仙經道以精為寶施與人則生人留於己則生身生身永度世名在於仙位生人即功遂功遂而身退身退陷俗巳為劇何況妄施而廢棄棄損不覺多故廢老而墜天地有隂陽隂陽人所貴貴之合於道但當愼無費老君曰精者血脈之川源守骨之靈神也精去則骨枯骨枯則死是以寶之也人以身為國心為君精為臣氣為民氣變為精精化為神神化為嬰兒嬰兒上為真人然後為赤子此真一也天有三光日月星人有三寶神氣精三丹田者兩眉間泥九宮上丹田也心為絳宫中丹田也臍下三寸下丹田也常念此三丹田中亦子真人嬰兒此要道也言人能守一萬事畢正謂此也老君曰從朝至暮常習不息即長生矣兩眉間却入一寸為眀堂二寸為洞房三寸為上丹田此上元真一者赤子字元先一名帝卿心為絳宮中丹田為中元真一者真人字子丹一名光堅臍下三寸為下丹田為下元真一者嬰見字元陽一名谷玄此三光也行氣閉氣常存念之行氣訣凡欲求仙大法有三一保精二行氣三服餌凡此三事亦各有淺深不遇至人不涉勤苦亦不可卒知之也然保精之術列敘百數服餌之方略有子種皆以勤勞不強為務故行氣可以治百病可以去瘟疫可以禁蛇獸可以止瘡血可以居水中可以辟飢渴可以延年命其大要者胎息而巳胎息者不復以口鼻為之如在胞胎之中則成道矣凡行氣之道其法當在密室閉戶安牀暖厚席褥枕高二寸半方與身平正身偃卧暝目閉氣自止於胸膈以鴻毛著鼻上毛不動經三百息百無所聞目無所視心無所思當以漸除之耳若食生冷五辛魚肉及喜怒憂恚而引氣者非止無益更增氣病上氣攻逆也不能閉之則稍學之則稍學之初起三息五息七息九息而一舒更吸之若能十二息氣者為小通也百二十息不舒者為大通也此治身之大要也常以夜半後生氣之時閉氣以心中默數數之令耳不聞也凡行氣服氣日午巳後夜半巳前名為死氣不可服用也唯酉時氣可服為日近明淨不為死氣加之服亦可耳凡服氣取子午卯酉時服是也如冬三月子時不可服為寒也夏三月午畤不可服之為熱也仍須以意消息大略若腹中大冷取近日氣及日午之氣若腹中大熱取夜半氣及平旦之氣服也凡服氣遇冬三月寒則於一小室中生炭火暖之服之則腹中沖和如夏極熱時仍取月中氣服之則大涼矣每欲服氣常取體中安穩消息自然得所如安穩則不住消息行之耳若住則加道引引之尤佳矣凡初服入氣之時善用息以飽為度若飽後即導引之自然安泰也既得安泰永無疾苦巳至道成矣夫善用氣者噓水水為逆流噓火火為滅熖噓虎豹虎豹為之伏匿噓瘡血瘡血則止而矣治萬病訣凡治諸病病在喉中胸中者枕髙七寸病在心下者枕髙四寸病在臍下者去枕以口出氣鼻納氣者名曰㵼閉口溫氣咽之者名曰補欲引頭病者仰頭欲引腰腳病者仰足十指欲引胸中病者俯足十指欲引去腹中寒熱諸所不快者皆閉氣脹腹欲息百須以鼻息巳復為至愈乃止矣一平坐生腰腳兩臂展手據地口徐吐氣以鼻納之者除胸中肺中之痛咽氣令溫閉目用也一端坐生腰以鼻內氣閉之自前後搖頭各三十者除頭虛空花耗地轉之疾閉目搖之一左脅側卧以口吐氣以鼻納之者除積聚心下不快之證一端坐生腰徐以鼻納氣以右手持鼻者除目昏若淚出者去鼻中息亦治耳聾亦除傷寒頭痛之疾皆當以汗出為度一正偃卧以口徐出氣以鼻納之者除裏急飽食後小咽若咽氣數至十令溫者為度若氣寒者便人乾嘔腹痛可用鼻納氣咽之七至十至百則大填腹內除邪氣補正氣也一右脅側卧以鼻納氣以口小吐氣數至十兩手相摩熱以摩腹令其氣下出之者除兩脅皮膚痛悶之疾愈者止一端坐生腹直上展兩臂仰兩手掌以鼻納氣閉之自極七息名曰蜀玉臺除脅下積聚之疾一覆卧去枕堅立兩足以鼻納氣四復以鼻出之四若氣出之極令微氣再入鼻中勿令鼻知除身中熱及背痛之疾一端坐生腰舉左手仰其掌却右手同除兩臂及背痛之疾氣結積聚之病一端坐以兩手相抱膝閉氣鼓腹二七或三七氣滿則吐後氣通暢者為度行之十年老有少容一端坐生腰左右傾側閉目以鼻納氣除頭風自極七息止一端坐生腰鼻納氣數十為度除腹中飲食滿飽若快則止未便者復為之若腹中有寒氣亦為之一端坐使兩手如張弓勢滿射可治四肢煩悶背急每日或時為之佳一端坐生腰舉右手仰掌以左手承左脅以鼻內氣自極七息除胃寒食不變則愈一端坐生腰舉左手仰掌以右手承右脅以鼻納氣自極七息除瘀血納氣等並皆治之一兩手却據仰頭自以鼻納息因而咽之數十除熱身中傷死肌肉等治之而愈一正偃卧端展足臂以鼻納氣目極七息搖足三十而止除胸足中寒周身痺厥逆嗽一偃卧屈膝令兩膝頭內向相對手翻兩足生腰以鼻納氣自極七息除痺疼熱痛兩腔不遂一平坐兩手抱頭宛轉上下名為開脅除身體昏沉不通暢者並皆愈之一踞坐伸右腳兩手抱左膝頭生腰以鼻納氣自極七息除難屈伸及拜起䏶中痛瘀痺等病並皆治之一踞坐伸左足兩手抱右膝生腰以鼻納氣自極七息展左足著外除難屈伸及拜起䏶中疼一本云除風并目晦耳聾一正偃卧直兩手兩手棯胞所在令如油囊裹丹隂下濕小便難頽小腹重不快若腹中熱但口出氣鼻納之數十止亦不須小咽之若腹中不執者行七息以溫氣咽之十止一覆卧傍視兩踵生腰以鼻納氣自極七息除腳中弦痛轉筋及腳酸痛一踞坐兩手抱兩膝頭以鼻納氣自極七息除腰痺背痛一偃卧展兩䏶兩手令兩踵相向亦鼻納氣自極七息除死肌及足䏶寒癮之疾一偃卧兩手兩䏶左膀兩足踵以鼻納氣自極七息除胃中有食不消苦嘔之疾一踞坐生腰以兩手引兩踵以鼻納氣自極七息向兩膝頭者除身痺嘔逆之疾一偃卧展兩手兩腳仰足指以鼻納氣自極七息除服中弦急切痛一偃卧左足踵拘右足拇指以鼻納氣自極七息除厥疾若人腳錯踵不拘拇指依文用之一偃卧以右足踵拘左足拇指以鼻納氣自極七息除周身痺一病若在左端坐生腰右視目以鼻納氣極而吐之數十止閉目而作一若病在心下積聚者端坐生腰向日仰頭徐以鼻納氣因而咽之三十而止開目而作一若痛在右端坐生腰左視目以鼻徐納氣而咽之數十止元陽經云常以鼻納氣含而漱之舌料唇齒咽之一日夜得千咽者大佳當少飮食多即氣逆逆則百脈閉百脈閉則氣不行氣不行則疾病生玄禾曰志者氣之神也氣者體之充也善者遂其生惡者喪其形故行氣之法少食自節心定自安志堅自通意專自逹夊成仙矣若人服氣行氣者必當詳審斯篇而行之道可成矣真人曰夫天道盈缺人事多屯居處屯危不能自慎而能克濟者天下無之故養性之士不知自慎之方未足以論養生服氣之道也故以自慎為首焉夫聖人安不忘危恆以憂畏為本若無所畏忌則庶事隳壞矣經云人不畏威則太威至矣故以治身者不以憂畏朋友遠之治家者不以憂畏奴僕侮之治國者不以憂畏鄰境侵之治天下者不以憂畏道德去之故憂畏者生死之門禮教之主存亡之由禍福之本古凶之元也是故士無憂畏則身名不立農無憂畏則稼穡不滋工無憂畏則規矩不設商無憂畏則貨殖不廣子無憂畏則孝敬不篤父無憂畏則慈愛不箸臣無憂畏則勳庸不建君無憂畏則社稷不安服氣養性修錬胎息習學至道希慕伸仙祕法者若失其憂畏則心亂而不治形躁而不寧神散而氣越志蕩而意昏應生者死應死者速應成者敗應古者凶其憂畏者猶之水火不可暫忘也人無憂畏子弟為勍敵妻妾為冦仇是以太上畏道其次畏物其次畏人其次畏身故憂於身者不拘於人畏於巳者不制於彼慎於小者不懼於大戒於近者不悔於逺能知此者水行蛟龍不能害陸行虎兕不能傷處世謗讟不能加善知此者萬事畢矣夫萬病橫生年命橫天多由飲食之患飲食之患者過於聲色聲色者可絶之踰年唯飲食不可廢於一日為益既廣為患益深且滋味者百品或於氣勢相伐觸其禁忌更成沉毒綏者積年成病急者災患而卒至也凡夏至後迄秋分勿食肥膩餅𦞦之屬此乃酒漿果瓜相妨或當時不覺則病入秋節變生多諸暴下皆由涉夏取冷大過飲食不節故也而或者以病至之日便為得病之初殊不知其由來者漸矣欲知自慎者當慎之於微也夫養性服氣胎息至道者當少思少念少欲少事少語少笑少愁少樂少喜少怒少好少惡行此十二少者學道養生之都契也多思則神殆多念則志敗多欲則損志多事則形勞多語則氣爭多笑則傷藏多愁則心攝多樂則意溢多喜則志錯昏亂多怒則百脈不定多好則專迷不理多惡則憔悴無歡此十二多不除者喪生損氣之本也唯無多無少幾乎道也故處士少疾遊子多患繁簡之殊也是故田夫夀髙梁夫命短蓋嗜欲多少之驗也故俗人競利道士罕營夫常人不可無欲又復不可無事但約私心約狂念靖躬損思則漸漸而自息耳封君逹云體欲常勞食欲常少勞勿過極少勿過虛恆去肥濃節鹹酸減思慮損喜恕除馳逐慎房室春夏施瀉秋冬閉藏又魚膾生肉諸生冷之物此多損人速宜斷之彌大善也心常念善不欲謀欺詐惡業之事此者大辱神損壽也忌之戒之不可犯也彭祖曰重衣厚褥體不甘苦以致風寒之疾味脯肥甘醉飽饜飫以致疝結之病美色妖麗嬌妾盈房以致虛損之禍淫聲哀音怡心恱耳以致荒耽之惑馳騁遊觀弋獵原野以致發狂之迷謀得戰勝取亂兼弱以致驕逸之敗斯蓋聖人戒其失理可不思以自朂也夫養生服氣之道勿以久行久坐久聽久視不可強食強飲亦不可憂思愁哀飢乃食渴乃飲食止行數百步大益人夜勿以食若食則行約五里者無病損也日夕有所營為不住為佳不可至疲極不得大安無所為也故曰流水不腐戶樞不蠹以其勞動而不息也又曰夫服氣之人可以須知調護不偏也故云久視傷血久卧傷氣久立傷骨久行傷筋久坐傷肉遠思強健傷人憂恚悲哀傷人喜樂過差傷人忿怒不解傷人汲汲所願傷人戚戚所患傷人寒暖失節傷人隂陽不交傷人凡交須依導引諸術若能避衆傷人之事而復曉隂陽之術則是不死之道也俗人但知會於五味不知有元氣可飲聖人知五味之毒焉故不貪知元氣之可服焉故閉口不言精氣息應也凡服氣者斯文前後通覽審而行之大道全矣神仙食氣金匱妙録
