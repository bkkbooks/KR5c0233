front:
  text: 神仙食炁金櫃妙録命七
  hash: sha256:1909f60ab2e4930d4d1bd5f1f2afc7692d9f33e53b53e8413dedbe3d20156422
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0233_HFL_000-001a, image: hfl/0571/0571-092.png}
body:
  text: 京黑先生譔服隂陽符召六甲玉女法夫欲修長生學仙者先須餌炁絶粒保精有神其法並有漸次階級不可踰軌越格輒爾登陟務速必不逹造次必顛墜是欲依之即無悞累矣凡絶粒慮五神播蕩邪妄忓凌宜服神仙絶穀符欲服之法常以平旦東向左手持符右手執水黙祝之曰某甲好樂眞道服食中和之炁甲子太玄玉女承翼給侍某甲行廚所在法成所求當得無令飢渴軍無大小人無多少皆當得飽祝訖即以水服符符自甲子起初至終六十日並同此祝餘甲當逐旬改呼玉女名字給侍巳下勿敗之其符二道一隂一陽隨隂陽日月别書之此符中甲子字至丙寅即改爲丙寅字盡三十箇陽日勿令錯此符中乙丑字至丁卯即改爲丁卯字盡三十箇隂日勿今錯陽符主甲丙戊庚壬子寅辰午申戌巳上日辰朱書之隂符主乙丁巳辛癸丑卯巳未酉亥巳上日辰愚書之甲子玉女名太玄字承翼盡一旬呼甲子太玄玉女承翼給侍某甲云云甲戌玉女名黃素字非㢘准上甲申玉女名太素字瓊石唯上甲午玉女名絳宮字雲齡維上甲辰玉女名拜精字靈素維上甲寅玉女名青腰字惠精毎一旬一玉女直事依經平旦持符執水祝而服之玉女當隨心應念係護人矣此法非但自已修行能爲他人絶穀不限十人五人多少皆得如意自在矣唯要志心清潔一齊陣立向日嚴事所奉師道稱名再拜奉符如法皆能不食節解注含徳之厚日六甲六癸相含而咽之以生精神也又經曰孰能有餘以奉天下唯有道者注云能掬之以補丹田引炁結精唯有道者所能解也中嶽郄儉食十一時炁法平旦七七四十九咽日岀六六三十六咽食時五五二十五咽禺中四四一十六咽日中九九八十一咽日昳八八六十四咽晡時七七四十九咽日入六六三十六咽黄昏五五二十五咽人定四四一十六咽半夜九九八十一咽雞鳴八八六十四咽黄庭經曰玉池清水灌靈根手能修之可長存名曰飲食自然自然者華池華池者口中之唾也呼吸如法咽之即不飢矣初絶穀三日七日小極頭眩愼勿怪也滿二十一日成矣炁力日増欲食可食不欲即息禁絶隂陽不可亡精失炁也食榖乃通食炁辟穀法法曰先合口引之納炁咽之滿三百六十巳上不得減此咽之欲多多益善能日咽至千益眀咽而食日減一餐十日後能不食也後炁常入不岀意炁常飽不食三日腹中悁悁若飢或小便赤黄取好棗九枚若好脯如棗者九枚念食噉一枚若二枚至三枚一晝一夜無過此九棗意中不念食者不須噉也常含棗核受炁令口中行津液嘉眞人食黄炁法食黄之法常念脾飽胃黄炁潤澤神人長三寸著黄衣如立像兩手中各一人亦著黄衣如見即竊呼之黃常子黄常子黄庭眞人在吾巳生爲吾耳醴淵酒脯神丹芝草諸可飮食令並立來至咽之常以雞鳴時畫若飢者向日如上法爲之飢取飽止行炁法初行炁小不調久行易耳正偃卧握固兩足間相去四五寸兩臂間相去亦四五寸去枕微息四九三百六十息如委衣骨節皆解初爲勢至三十息後自轉易覺炁如雲行體中經營周身濡潤形體澆灌皮膚五藏六府皆悉充滿舊疾皆散爲之不止則康壯矣握固者如嬰兒之卷手也初行炁先安穩其身而和其炁無與意爭若不和且止和乃爲之常守之勿倦也小行即小得之大行即大得之炁至則形安形安則鼻息調和鼻息調和則清氣來至清氣來至則覺形熱覺形熱則頗汗出汗出勿使起則神安神安則道自見矣飬炁務欲其久當去忿怒愁憂去忿怒愁憂則炁不亂炁不亂則正炁來至正炁來至則口中甘香口中甘香則多唾多唾則鼻息微長鼻息微長則五藏安五藏安則炁各順其理百病退去飲食甘美三炁和則形輕强夀老證見遂長生矣行炁以鼻納炁以口吐炁微而引之名曰長息納炁有一吐炁有六納炁一者謂吸也吐炁六者謂吹呼嘻呵嘘呬皆出炁也凡人之息一呼一吸無有此數欲爲長息吐炁之法時寒可吹時温可呼委曲治病吹以去寒呼以去熱嘻以去風又以去痛呵以去煩又以下炁嘘以散滯呬以解極凡人極者則多嘘呬道家行炁率不欲嘘呬者嘘呬者長息之忌也此男女俱存法本於仙經道以精爲寳施與人則生人留於己則生身生身永度世名在於仙位生人即功遂功遂而身退身退䧟俗巳爲劇何況妄施而廢棄棄損不覺多故廢老而墜天地有隂陽隂陽人所貴貴之合於道但當愼無費老君曰精者血脈之川源守骨之靈神也精去則骨枯骨枯則死是以寳之也人以身爲國心爲君精爲臣炁爲民炁變爲精精化爲神神化爲嬰兒嬰兒上爲眞人然後爲赤子此眞一也天有三光日月星人有三寳神炁精三丹田者兩眉間泥九宮上丹田也心爲絳宫中丹田也臍下三寸下丹田也常念此三丹田中亦子眞人嬰兒此要道也言人能守一萬事畢正謂此也老君曰從朝至暮常習不息即長生矣兩眉間却入一寸爲眀堂二寸爲洞房三寸爲上丹田此上元眞一者赤子字元先一名帝卿心爲絳宮中丹田爲中元眞一者眞人字子丹一名光堅臍下三寸爲下丹田爲下元眞一者嬰見字元陽一名谷玄此三光也行炁閉炁常存念之行炁訣凡欲求仙大法有三一保精二行炁三服餌凡此三事亦各有淺深不遇至人不渉勤苦亦不可卒知之也然保精之術列叙百數服餌之方略有子種皆以勤勞不强爲務故行炁可以治百病可以去瘟疫可以禁蛇獸可以止瘡血可以居水中可以辟飢渇可以延年命其大要者胎息而巳胎息者不復以口鼻爲之如在胞胎之中則成道矣凡行炁之道其法當在宻室閉戸安牀暖厚蓆褥枕高二寸半方與身平正身偃卧暝目閉炁自止於胷膈以鴻毛著鼻上毛不動經三百息百無所聞目無所視心無所思當以漸除之耳若食生冷五辛魚肉及喜怒憂恚而引炁者非止無益更増炁病上炁攻逆也不能閉之則稍學之則稍學之初起三息五息七息九息而一舒更噏之若能十二息炁者爲小通也百二十息不舒者爲大通也此治身之大要也常以夜半後生炁之時閉炁以心中默數數之令耳不聞也凡行炁服炁日午巳後夜半巳前名爲死炁不可服用也唯酉時炁可服爲日近明淨不爲死炁加之服亦可耳凡服炁取子午卯酉時服是也如冬三月子時不可服爲寒也夏三月午畤不可服之爲熱也仍須以意消息大略若腹中大冷取近日炁及日午之炁若腹中大熱取夜半炁及平旦之炁服也凡服炁遇冬三月寒則於一小室中生炭火暖之服之則腹中沖和如夏極熱時仍取月中炁服之則大涼矣毎欲服炁常取體中安穩消息自然得所如安穩則不住消息行之耳若住則加道引引之尤佳矣凡初服入炁之時善用息以飽爲度若飽後即導引之自然安泰也既得安泰永無疾苦巳至道成矣夫善用炁者嘘水水爲逆流嘘火火爲滅熖嘘虎豹虎豹爲之伏匿嘘瘡血瘡血則止而矣治萬病訣凡治諸病病在喉中胷中者枕髙七寸病在心下者枕髙四寸病在臍下者去枕以口出炁鼻納炁者名曰㵼閉口温炁咽之者名曰補欲引頭病者仰頭欲引腰脚病者仰足十指欲引胷中病者俛足十指欲引去腹中寒熱諸所不快者皆閉炁脹腹欲息百須以鼻息巳復爲至愈乃止矣一平坐生腰脚兩臂展手據地口徐吐炁以鼻納之者除胷中肺中之痛咽炁令温閉目用也一端坐生腰以鼻内炁閉之自前後摇頭各三十者除頭虛空花耗地轉之疾閉目揺之一左脇側卧以口吐炁以鼻納之者除積聚心下不快之證一端坐生腰徐以鼻納炁以右手持鼻者除目昏若涙出者去鼻中息亦治耳聾亦除傷寒頭痛之疾皆當以汗出爲度一正偃卧以口徐岀炁以鼻納之者除裏急飽食後小咽若咽炁數至十令温者爲度若炁寒者便人乾嘔腹痛可用鼻納炁咽之七至十至百則大填腹内除邪炁補正炁也一右脇側卧以鼻納炁以口小吐炁數至十兩手相摩熱以摩腹令其炁下出之者除兩脇皮膚痛悶之疾愈者止一端坐生腹直上展兩臂仰兩手掌以鼻納炁閉之自極七息名曰蜀玉臺除脇下積聚之疾一覆卧去枕堅立兩足以鼻納炁四復以鼻出之四若炁出之極令微炁再入鼻中勿令鼻知除身中熱及背痛之疾一端坐生腰舉左手仰其掌却右手同除兩臂及背痛之疾炁結積聚之病一端坐以兩手相抱膝閉炁鼔腹二七或三七炁滿則吐後炁通暢者爲度行之十年老有少容一端坐生腰左右傾側閉目以鼻納炁除頭風自極七息止一端坐生腰鼻納炁數十爲度除腹中飲食滿飽若快則止未便者復爲之若腹中有寒炁亦爲之一端坐使兩手如張弓勢滿射可治四肢煩悶背急每日或時爲之佳一端坐生腰舉右手仰掌以左手承左脇以鼻内炁自極七息除胃寒食不變則愈一端坐生腰舉左手仰掌以右手承右脇以鼻納炁自極七息除瘀血納炁等並皆治之一兩手却據仰頭自以鼻納息因而咽之數十除熱身中傷死肌肉等治之而愈一正偃卧端展足臂以鼻納炁目極七息揺足三十而止除胷足中寒周身痺厥逆嗽一偃卧屈膝令兩膝頭内向相對手翻兩足生腰以鼻納炁自極七息除痺𤻴熱痛兩腔不遂一平坐兩手抱頭宛轉上下名爲開脇除身體昏沉不通暢者並皆愈之一踞坐伸右脚兩手抱左膝頭生腰以鼻納炁自極七息除難屈伸及拜起䏶中痛瘀痺等病並皆治之一踞坐伸左足兩手抱右膝生腰以鼻納炁自極七息展左足著外除難屈伸及拜起䏶中𤻴一本云除風并目晦耳聾一正偃卧直兩手兩手棯胞所在令如油囊裹丹隂下濕小便難頽小腹重不快若腹中熱但口出炁鼻納之数十止亦不須小咽之若腹中不執者行七息以温炁咽之十止一覆卧傍視兩踵生腰以鼻納炁自極七息除脚中弦痛轉筋及脚酸痛一踞坐兩手抱兩膝頭以鼻納炁自極七息除腰痺背痛一偃卧展兩䏶兩手令兩踵相向亦鼻納炁自極七息除死肌及足䏶寒瘾之疾一偃卧兩手兩䏶左膀兩足踵以鼻納炁自極七息除胃中有食不消苦嘔之疾一踞坐生腰以兩手引兩踵以鼻納炁自極七息向兩膝頭者除身痺嘔逆之疾一偃卧展兩手兩脚仰足指以鼻納炁自極七息除服中弦急切痛一偃卧左足踵拘右足拇指以鼻納炁自極七息除厥疾若人脚錯踵不拘拇指依文用之一偃卧以右足踵拘左足拇指以鼻納炁自極七息除周身痺一病若在左端坐生腰右視目以鼻納炁極而吐之數十止閉目而作一若病在心下積聚者端坐生腰向日仰頭徐以鼻納炁因而咽之三十而止開目而作一若痛在右端坐生腰左視目以鼻徐納炁而咽之數十止元陽經云常以鼻納炁含而漱之舌料唇齒咽之一日夜得千咽者大佳當少飮食多即炁逆逆則百脉閉百脉閉則炁不行炁不行則疾病生玄禾曰志者炁之神也炁者體之充也善者遂其生惡者丧其形故行炁之法少食自節心定自安志堅自通意專自逹夊成仙矣若人服炁行炁者必當詳審斯篇而行之道可成矣真人曰夫天道盈缺人事多屯居處屯危不能自慎而能克濟者天下無之故養性之士不知自慎之方未足以論養生服炁之道也故以自慎爲首焉夫聖人安不忘危恒以憂畏爲本若無所畏忌則庶事隳壞矣經云人不畏威則太威至矣故以治身者不以憂畏朋友遠之治家者不以憂畏奴僕侮之治國者不以憂畏鄰境侵之治天下者不以憂畏道徳去之故憂畏者生死之門禮教之主存亡之由禍福之本古凶之元也是故士無憂畏則身名不立農無憂畏則稼穡不滋工無憂畏則規矩不設商無憂畏則貨殖不廣子無憂畏則孝敬不篤父無憂畏則慈愛不箸臣無憂畏則勳庸不建君無憂畏則社稷不安服炁養性修錬胎息習學至道希慕伸仙祕法者若失其憂畏則心亂而不治形躁而不寧神散而炁越志蕩而意昏應生者死應死者速應成者敗應古者凶其憂畏者猶之水火不可暫忘也人無憂畏子弟爲勍敵妻妾爲冦仇是以太上畏道其次畏物其次畏人其次畏身故憂於身者不拘於人畏於巳者不制於彼慎於小者不懼於大戒於近者不悔於逺能知此者水行蛟龍不能害陸行虎兕不能傷處世謗讟不能加善知此者萬事畢矣夫萬病橫生年命横天多由飲食之患飲食之患者過於聲色聲色者可絶之踰年唯飲食不可廢於一日爲益既廣爲患益深且滋味者百品或於氣勢相伐觸其禁忌更成沉毒綏者積年成病急者灾患而卒至也凡夏至後迄秋分勿食肥膩餅𦞦之屬此乃酒漿菓瓜相妨或當時不覺則病入秋節變生多諸暴下皆由渉夏取冷大過飲食不節故也而或者以病至之日便爲得病之初殊不知其由來者漸矣欲知自慎者當慎之於微也夫養性服炁胎息至道者當少思少念少欲少事少語少笑少愁少樂少喜少怒少好少惡行此十二少者學道養生之都契也多思則神殆多念則志敗多欲則損志多事則形勞多語則炁爭多笑則傷藏多愁則心攝多樂則意溢多喜則志錯昏亂多怒則百脉不定多好則專迷不理多惡則憔悴無歡此十二多不除者丧生損炁之本也唯無多無少幾乎道也故處士少疾遊子多患繁簡之殊也是故田夫夀髙梁夫命短蓋嗜慾多少之驗也故俗人競利道士罕營夫常人不可無欲又復不可無事但約私心約狂念靖躬損思則漸漸而自息耳封君逹云體欲常勞食欲常少勞勿過極少勿過虚恒去肥濃節鹹酸減思慮損喜恕除馳逐慎房室春夏施瀉秋冬閉藏又魚膾生肉諸生冷之物此多損人速宜斷之彌大善也心常念善不欲謀欺詐惡業之事此者大辱神損壽也忌之戒之不可犯也彭祖曰重衣厚褥體不甘苦以致風寒之疾味脯肥甘醉飽饜飫以致疝結之病美色妖麗嬌妾盈房以致虛損之禍淫聲哀音怡心恱耳以致荒耽之惑馳騁遊觀弋獵原野以致發狂之迷謀得戰勝取亂兼弱以致驕逸之敗斯盖聖人戒其失理可不思以自朂也夫養生服炁之道勿以久行久坐久聽久視不可强食强飲亦不可憂思愁哀飢乃食渇乃飲食止行數百歩大益人夜勿以食若食則行約五里者無病損也日夕有所營爲不住爲佳不可至疲極不得大安無所爲也故曰流水不腐戸樞不蠹以其勞動而不息也又曰夫服炁之人可以須知調護不偏也故云久視傷血久卧傷炁久立傷骨久行傷筋久坐傷肉遠思强健傷人憂恚悲哀傷人喜樂過差傷人忿怒不解傷人汲汲所願傷人戚戚所患傷人寒暖失節傷人隂陽不交傷人凡交須依導引諸術若能避衆傷人之事而復暁隂陽之術則是不死之道也俗人但知㑹於五味不知有元炁可飲聖人知五味之毒焉故不貪知元炁之可服焉故閉口不言精炁息應也凡服炁者斯文前後通覧審而行之大道全矣神仙食炁金櫃妙録
